name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      confirm_aws_deploy:
        description: "Type true only after AWS secrets and S3/CloudFront are configured."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm_aws_deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate HTML
        run: |
          # Install html5validator
          pip install html5-validator
          html5validator --root . --ignore-re "^Duplicate attribute"

      - name: Sync to S3
        run: |
          # Sync with cache headers for optimal performance
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude ".DS_Store" \
            --cache-control "max-age=31536000" \
            --exclude "index.html" \
            --exclude "about.html" \
            --exclude "404.html" \
            --exclude "robots.txt" \
            --exclude "*.md"
          
          # HTML files with no cache (always fresh)
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          
          aws s3 cp about.html s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          aws s3 cp 404.html s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          aws s3 cp robots.txt s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --cache-control "max-age=3600" \
            --content-type "text/plain; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully!"
          echo "Website URL: https://${{ secrets.DOMAIN_NAME }}"
